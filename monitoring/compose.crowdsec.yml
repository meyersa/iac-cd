services:
  crowdsec:
    image: crowdsecurity/crowdsec:latest-debian
    container_name: crowdsec
    restart: unless-stopped
    networks:
      - operations_traefik
      - loki
    ports:
      - "127.0.0.1:6060:6060"
    expose:
      - "8080"
      - "7422"
    env_file:
      - ./compose.crowdsec.env
    mem_limit: 256m
    cpus: 0.5
    volumes:
      - ./crowdsec/crowdsec-acquis.yml:/etc/crowdsec/acquis.yaml
      - ./crowdsec/crowdsec-profiles.yml:/etc/crowdsec/profiles.yaml
      - ./crowdsec/crowdsec-discord.yml:/etc/crowdsec/notifications/discord.yaml
      - crowdsec-config:/etc/crowdsec
      - crowdsec-data:/var/lib/crowdsec/data
    labels:
      traefik.enable: "true"
      traefik.http.routers.crowdsec.rule: Host(`crowdsec.${BACKEND_DOMAIN}`)
      traefik.http.routers.crowdsec.entrypoints: apisecure
      traefik.http.services.crowdsec.loadbalancer.server.port: "8080"
      alloy.scrape: "true"
      alloy.job: crowdsec
      alloy.port: "6060"

networks:
  operations_traefik:
    external: true

volumes: 
  crowdsec-data: 
  crowdsec-config: