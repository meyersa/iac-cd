# Skip Slack type to get webhook
type: http
name: slack_default

log_level: info

# Avoid spamming notifications
group_wait: 30s


format: |
  {
    "attachments": [
      {{range . -}}
      {{$alert := . -}}
      {{range .Decisions -}}
      {{$cti := .Value | CrowdsecCTI -}}

      {
        "color": "#ff0000",
        "ts": "{{($alert.StartAt.Unix)}}",
        "title": "CrowdSec Alert",
        "title_link": "https://app.crowdsec.net/cti/{{.Value}}",
        "text": "Potential threat detected for {{.Value}}",

        "fields": [
          {
            "title": "IP",
            "value": "<https://www.whois.com/whois/{{.Value}}|{{.Value}}>",
            "short": true
          },
          {
            "title": "Action",
            "value": "{{.Type}} for {{.Duration}}",
            "short": true
          },
          {
            "title": "Scenario",
            "value": "{{.Scenario}}",
            "short": true
          },
          {
            "title": "Machine",
            "value": "{{ $alert.MachineID }}",
            "short": true
          }
          {{if $alert.Source.Cn -}},
          {
            "title": "Country",
            "value": "{{$alert.Source.Cn | upper}}",
            "short": true
          }
          {{end -}}

          {{if $cti.Location.City -}},
          {
            "title": "City",
            "value": "{{$cti.Location.City}}",
            "short": true
          }
          {{end -}}

          {{if $cti.GetMaliciousnessScore -}},
          {
            "title": "Maliciousness",
            "value": "{{mulf $cti.GetMaliciousnessScore 100 | floor}}%",
            "short": true
          }
          {{end -}}
        ]
      }
      {{end -}}
      {{end -}}
    ]
  }

url: ${CROWDSEC_WEBHOOK}
method: POST
headers:
  Content-Type: application/json